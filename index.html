<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pathology Note Generator v14</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; max-width: 1100px; margin: 20px auto; padding: 0 20px; background: #f0f2f5; color: #1c1e21; }
        .card { background: white; padding: 18px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px; border: 1px solid #e1e8ed; position: relative; }
        #idWarning { display: none; background: #d63031; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; text-align: center; }
        .patient-info { display: flex; gap: 20px; margin-bottom: 15px; padding: 10px; background: #dfe6e9; border-radius: 8px; font-size: 0.85rem; }
        .mismatch { background: #fab1a0 !important; border: 2px solid #ff7675; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #636e72; margin: 0; }
        .main-btn { background: #0984e3; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; width: 100%; margin-bottom: 15px; transition: background 0.2s; }
        .main-btn:hover { background: #0773c5; }
        .clear-btn { background: none; border: none; color: #d63031; font-size: 0.7rem; cursor: pointer; text-decoration: underline; }
        .output-card { background: #2d3436; color: #55efc4; padding: 25px; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 1.1rem; line-height: 1.6; white-space: pre-wrap; }
        .copy-btn { background: #00b894; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; font-size: 1.1rem; }
        .copy-btn:hover { background: #009475; }
        .param-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 5px; margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 8px; border: 1px solid #eee; }
        .param-container label { font-size: 0.65rem; display: flex; align-items: center; gap: 3px; cursor: pointer; }
        select { width: 100%; margin: 8px 0; padding: 5px; border-radius: 4px; border: 1px solid #ddd; background: white; }
    </style>
</head>
<body>

<div id="idWarning">⚠️ PATIENT NAME MISMATCH DETECTED! CHECK SOURCES.</div>

<div class="card">
    <div style="display: flex; gap: 10px;">
        <button class="main-btn" onclick="smartPaste()">PASTE FROM CLIPBOARD</button>
        <button onclick="clearAll()" style="height: 50px; background:#636e72; color:white; border:none; border-radius:8px; padding: 0 15px; cursor:pointer; font-weight:bold;">Clear All</button>
    </div>
    <div class="patient-info" id="patientBar">
        <div><strong>FBC:</strong> <span id="nameFBC">---</span></div>
        <div><strong>CHEM:</strong> <span id="nameCHEM">---</span></div>
        <div><strong>VBG:</strong> <span id="nameVBG">---</span></div>
    </div>
</div>

<div class="grid">
    <div class="card" id="cardFBC">
        <div class="header-row"><h2>FBC</h2> <button class="clear-btn" onclick="clearTable('FBC')">Clear</button></div>
        <textarea id="inputFBC" readonly style="display:none;"></textarea>
        <select id="dateFBC" onchange="updateSummary()" style="display:none"></select>
        <div id="paramsFBC" class="param-container"></div>
    </div>

    <div class="card" id="cardCHEM">
        <div class="header-row"><h2>CHEM20</h2> <button class="clear-btn" onclick="clearTable('CHEM')">Clear</button></div>
        <textarea id="inputCHEM" readonly style="display:none;"></textarea>
        <select id="dateCHEM" onchange="updateSummary()" style="display:none"></select>
        <div id="paramsCHEM" class="param-container"></div>
    </div>

    <div class="card" id="cardVBG">
        <div class="header-row"><h2>VBG</h2> <button class="clear-btn" onclick="clearTable('VBG')">Clear</button></div>
        <textarea id="inputVBG" readonly style="display:none;"></textarea>
        <select id="dateVBG" onchange="updateSummary()" style="display:none"></select>
        <div id="paramsVBG" class="param-container"></div>
    </div>
</div>

<div class="card">
    <h2>Note Preview</h2>
    <div id="summaryOutput" class="output-card">Waiting for data paste...</div>
    <button class="copy-btn" onclick="copyResult()">Copy Note to Clipboard</button>
</div>

<script>
    const dataStore = { FBC: [], CHEM: [], VBG: [] };
    const mappings = { FBC: {}, CHEM: {}, VBG: {} };
    const patientNames = { FBC: "", CHEM: "", VBG: "" };
    let patientMeta = { age: 0, sex: 'm' };

    // Lab Reference Ranges
    const ranges = {
        'Hb_f': [110, 165], 'Hb_m': [120, 180],
        'WCC': [3.5, 11.0], 'Plt': [140, 400], 'HCT': [0.34, 0.47], 'MCV': [80, 100],
        'Neut': [2.00, 8.00], 'Lymph': [1.00, 4.00], 'Mono': [0.10, 1.00], 'Eosin': [0.00, 0.40],
        'Na': [135, 145], 'K': [3.5, 5.2], 'Cl': [95, 110], 'HCO3': [22, 32], 'anion gap': [4, 13],
        'glucose': [3.0, 7.8], 'urea': [2.9, 8.2], 'Cr': [36, 73], 'Mg': [0.70, 1.10], 'PO4': [0.75, 1.50],
        'Ca': [2.10, 2.60], 'Corr Ca': [2.10, 2.60], 'OSM': [275, 295],
        'pH': [7.31, 7.41], 'pCO2': [41, 51], 'lactate': [0.5, 2.2]
    };

    const config = {
        FBC: [
            { out: 'Hb', match: 'Haemoglobin', active: true },
            { out: 'Plt', match: 'Platelet Count', active: true },
            { out: 'HCT', match: 'Haematocrit', active: false },
            { out: 'MCV', match: 'MCV', active: false },
            { out: 'WCC', match: 'White Cell Count', active: true },
            { out: 'Neut', match: 'Neutrophils', active: true },
            { out: 'Lymph', match: 'Lymphocytes', active: true },
            { out: 'Mono', match: 'Monocytes', active: true },
            { out: 'Eosin', match: 'Eosinophils', active: true },
            { out: 'Baso', match: 'Basophils', active: false }
        ],
        CHEM: [
            { out: 'Na', match: 'Sodium', active: true },
            { out: 'K', match: 'Potassium', active: true },
            { out: 'Mg', match: 'Magnesium', active: true },
            { out: 'Ca', match: 'Calcium', active: false },
            { out: 'Corr Ca', match: 'Calcium (Alb. Corr.)', active: false },
            { out: 'Cl', match: 'Chloride', active: false },
            { out: 'PO4', match: 'Phosphate', active: false },
            { out: 'HCO3', match: 'Bicarbonate', active: true },
            { out: 'anion gap', match: 'Anion Gap', active: false },
            { out: 'glucose', match: 'Glucose', active: true },
            { out: 'urea', match: 'Urea', active: false },
            { out: 'Cr', match: 'Creatinine', active: false },
            { out: 'eGFR', match: 'CALC_EGFR', active: true }, 
            { out: 'urate', match: 'Urate', active: false },
            { out: 'protein', match: 'Protein (Total)', active: false },
            { out: 'albumin', match: 'Albumin', active: false },
            { out: 'globulin', match: 'Globulin', active: false },
            { out: 'Bili', match: 'Bilirubin (Total)', active: false },
            { out: 'Bili(conj)', match: 'Bilirubin (Conj.)', active: false },
            { out: 'ALP', match: 'Alkaline Phosphatase', active: false },
            { out: 'GGT', match: 'Gamma-GT', active: false },
            { out: 'ALT', match: 'Alanine Transaminase', active: false },
            { out: 'AST', match: 'Aspartate Transaminase', active: false },
            { out: 'LD', match: 'Lactate Dehydrogenase', active: false },
            { out: 'OSM', match: 'Osmolality (Calculated)', active: false }
        ],
        VBG: [
            { out: 'pH', match: 'pH', active: true },
            { out: 'pO2', match: 'pO2', active: false },
            { out: 'pCO2', match: 'pCO2', active: true },
            { out: 'HCO3', match: 'Bicarbonate', active: true },
            { out: 'BE', match: 'Base Excess', active: false },
            { out: 'anion gap', match: 'Anion Gap', active: false },
            { out: 'lactate', match: 'Lactate', active: false },
            { out: 'Hb', match: 'Total Hb', active: true },
            { out: 'COHb', match: 'Carboxyhaemoglobin', active: false },
            { out: 'Na', match: 'Sodium', active: true },
            { out: 'K', match: 'Potassium', active: true },
            { out: 'Cl', match: 'Chloride', active: false },
            { out: 'iCa', match: 'Calcium (Ionised) (Bld Gas)', active: true },
            { out: 'glucose', match: 'Glucose', active: true }
        ]
    };

    async function smartPaste() {
        try {
            const text = await navigator.clipboard.readText();
            let target = text.includes("Full Blood Count") ? "FBC" : text.includes("Chemistry 20") ? "CHEM" : text.includes("B.Gas") ? "VBG" : null;
            if (!target) return alert("Unrecognized Table Type.");
            
            document.getElementById('input' + target).value = text;
            const nameLine = text.split('\n')[0];
            patientNames[target] = nameLine.split('(')[0].trim();
            document.getElementById('name' + target).innerText = patientNames[target];

            const ageMatch = text.match(/(\d+)\s*years/i);
            const sexMatch = text.match(/Male|Female/i);
            if (ageMatch) patientMeta.age = parseInt(ageMatch[1]);
            if (sexMatch) patientMeta.sex = (sexMatch[0].toLowerCase() === 'male') ? 'm' : 'f';

            checkPatientMismatch();
            parseData(target);
        } catch (err) { alert("Clipboard permission denied."); }
    }

    function calculateEGFR(cr_umol) {
        if (!cr_umol || isNaN(cr_umol) || cr_umol <= 0) return "x";
        
        // CKD-EPI 2009 Piecewise Logic per Excel Image
        const kappa = (patientMeta.sex === 'f') ? 0.7 : 0.9;
        const multiplier = (patientMeta.sex === 'f') ? 1.018 : 1.159;
        
        let alpha;
        if (patientMeta.sex === 'f') {
            alpha = (cr_umol > 62) ? -1.209 : -0.329;
        } else {
            alpha = (cr_umol > 80) ? -1.209 : -0.411;
        }

        const cr_mgdl = cr_umol * 0.0113;
        const egfr = 144 * Math.pow((cr_mgdl / kappa), alpha) * Math.pow(0.993, patientMeta.age) * multiplier;

        const rounded = Math.round(egfr);
        return rounded > 90 ? ">90" : rounded;
    }

    function checkPatientMismatch() {
        const active = Object.values(patientNames).filter(n => n !== "");
        const mismatch = new Set(active).size > 1;
        document.getElementById('idWarning').style.display = mismatch ? 'block' : 'none';
        document.getElementById('patientBar').className = mismatch ? 'patient-info mismatch' : 'patient-info';
    }

    function parseData(type) {
        const lines = document.getElementById('input' + type).value.split('\n');
        const dateIdx = lines.findIndex(l => l.trim().toLowerCase() === "date");
        mappings[type] = {};
        lines.forEach((line, idx) => {
            if (idx > dateIdx) {
                config[type].forEach(s => { if (line.trim() === s.match) mappings[type][s.out] = idx - dateIdx; });
            }
        });
        dataStore[type] = lines.filter(l => l.includes('\t') && /^\d{1,2}-[A-Za-z]{3}/.test(l.trim()));
        const sel = document.getElementById('date' + type);
        sel.innerHTML = "";
        dataStore[type].forEach((r, i) => sel.innerHTML += `<option value="${i}">${r.split('\t')[0]}</option>`);
        sel.style.display = dataStore[type].length > 0 ? "block" : "none";
        
        const container = document.getElementById('params' + type);
        container.innerHTML = "";
        config[type].forEach((p, i) => {
            container.innerHTML += `<label><input type="checkbox" class="chk-${type}" data-idx="${i}" ${p.active ? 'checked' : ''} onchange="updateSummary()"> ${p.out}</label>`;
        });
        updateSummary();
    }

    function getFlaggedVal(val, key) {
        if (!val || val === "x" || val === "" || val === ">90") return val;
        const clean = parseFloat(val.toString().replace(/[<>]/g, ''));
        
        let range;
        if (key === 'Hb') {
            range = (patientMeta.sex === 'm') ? ranges['Hb_m'] : ranges['Hb_f'];
        } else {
            range = ranges[key.replace('Corr ', '')];
        }

        if (range && (clean < range[0] || clean > range[1])) return val + "*";
        return val;
    }

    function updateSummary() {
        let finalNote = [];
        ['FBC', 'CHEM', 'VBG'].forEach(type => {
            if (dataStore[type].length > 0) {
                const dateVal = document.getElementById('date' + type).value;
                const row = dataStore[type][dateVal].split('\t');
                const parts = [];
                document.querySelectorAll(`.chk-${type}`).forEach(cb => {
                    if (cb.checked) {
                        const item = config[type][cb.dataset.idx];
                        let val;
                        if (item.match === 'CALC_EGFR') {
                            const crIdx = mappings[type]['Cr'];
                            val = calculateEGFR(parseFloat(row[crIdx]));
                        } else {
                            val = (mappings[type][item.out] !== undefined) ? row[mappings[type][item.out]].trim() : "x";
                        }
                        parts.push(`${item.out} ${getFlaggedVal(val, item.out)}`);
                    }
                });
                const label = type === 'CHEM' ? 'CHEM20' : type;
                finalNote.push(`- ${label}: ${parts.join(', ')}`);
            }
        });
        document.getElementById('summaryOutput').innerText = finalNote.join('\n') || "Waiting for data...";
    }

    function clearTable(type) {
        document.getElementById('input' + type).value = "";
        document.getElementById('date' + type).style.display = "none";
        document.getElementById('params' + type).innerHTML = "";
        document.getElementById('name' + type).innerText = "---";
        dataStore[type] = []; patientNames[type] = "";
        checkPatientMismatch(); updateSummary();
    }
    function clearAll() { ['FBC', 'CHEM', 'VBG'].forEach(clearTable); }
    function copyResult() { navigator.clipboard.writeText(document.getElementById('summaryOutput').innerText); }
</script>
</body>
</html>
